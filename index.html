<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalPass</title>
<meta name="description" content="Everything a visitor needs to know about a city, on one page. Real local prices, not tourist prices. No signup, no ads.">
<!-- Fonts are self-hosted (assets/fonts.css). The page must not hand the reader's
     IP to Google — the footer promises nothing is tracking you — and the
     round-trip to fonts.googleapis.com was render-blocking. The Noto Georgian
     faces carry the glyphs the other families lack; unicode-range means an
     English reader still never downloads them. -->
<link rel="preload" href="assets/fonts/inter-latin-400-700-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/fraunces-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="assets/fonts.css">
<meta name="theme-color" content="#FDF6EC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14120F" media="(prefers-color-scheme: dark)">
<!-- Set the theme before the first paint so a dark reader never sees a light flash. -->
<script>
  try {
    var stored = localStorage.getItem('localpass.theme');
    var theme = (stored === 'light' || stored === 'dark') ? stored
      : (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
</script>
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="assets/localpass_logo.png">
<link rel="apple-touch-icon" href="assets/localpass_logo.png">
</head>
<body>

<a class="skip" href="#essentials">Skip to content</a>

<div class="progress" aria-hidden="true"><i id="progressBar"></i></div>

<!-- ══════════════ NAV ══════════════ -->
<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="#top" class="brand">
      <img class="brand-logo" src="assets/localpass_logo.png" alt="" width="46" height="46" decoding="async">
      <span class="brand-text"><i>LocalPass</i></span>
    </a>

    <nav class="nav-links" id="navLinks" aria-label="Sections"></nav>

    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark theme" aria-pressed="false" title="Toggle dark / light">
        <svg class="ic-sun" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><circle cx="12" cy="12" r="4.3" fill="currentColor"/><g stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 2.4v2.8M12 18.8v2.8M2.4 12h2.8M18.8 12h2.8M4.9 4.9l2 2M17.1 17.1l2 2M19.1 4.9l-2 2M6.9 17.1l-2 2"/></g></svg>
        <svg class="ic-moon" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M20.5 15A8.2 8.2 0 0 1 9 3.5a7.5 7.5 0 1 0 11.5 11.5z" fill="currentColor"/></svg>
      </button>

      <div class="langpick" id="langpick" role="group" aria-label="Language">
        <button type="button" data-lang="en" aria-pressed="true">EN</button>
        <button type="button" data-lang="ka" aria-pressed="false" lang="ka">ქარ</button>
      </div>

      <div class="citypick" id="citypick">
        <button class="citypick-btn" id="citypickBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <circle cx="8" cy="8" r="6.6" fill="none" stroke="currentColor" stroke-width="1.2"/>
            <path d="M1.6 8h12.8M8 1.4c3.4 3.6 3.4 9.6 0 13.2M8 1.4C4.6 5 4.6 11 8 14.6" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span id="citypickCurrent">Prague</span>
          <svg class="chev" viewBox="0 0 10 6" width="9" height="6" aria-hidden="true"><path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <ul class="citypick-menu" id="citypickMenu" role="listbox"></ul>
      </div>
    </div>

    <!-- Outside .nav-right so the toggles can sit centred on a phone instead of
         being crushed against the right edge. Hidden above 820px. -->
    <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Rendered from data/cities/<slug>.json -->
<div id="app"></div>

<noscript>
  <div class="noscript">
    <h1>LocalPass</h1>
    <p>This guide is rendered from a small JSON file per city, so it needs JavaScript switched on.
       You can read the raw data directly at <code>data/cities/prague.json</code>,
       <code>data/cities/vienna.json</code> and <code>data/cities/ljubljana.json</code> — every price is in there, in plain text.</p>
  </div>
</noscript>

<script src="render.js"></script>
</body>
</html>
